<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Firebase Form</title>
</head>
<body>
  <h1>Simple Firebase Form</h1>
  <form id="userForm">
    <label for="name">Name:</label>
    <input type="text" id="name" required><br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" required><br><br>

    <label for="email">email:</label>
    <input type="email" id="email"required><br><br>

    <button type="submit">Submit</button>
  </form>

  <p id="status"></p>

  <script type="module">
    // Import Firebase SDKs
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-analytics.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    // Firebase config
    const firebaseConfig = {
     apiKey: "AIzaSyAbPYKWtWQbcA_3FFcFdUyW5zZzNplmET8",
  authDomain: "himai-e2962.firebaseapp.com",
  databaseURL: "https://himai-e2962-default-rtdb.firebaseio.com",
  projectId: "himai-e2962",
  storageBucket: "himai-e2962.firebasestorage.app",
  messagingSenderId: "615287873650",
  appId: "1:615287873650:web:aaecc9f0fdb4adb26e62eb",

    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const database = getDatabase(app);

    // Form submit handler
    const form = document.getElementById("userForm");
    const status = document.getElementById("status");

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const password = document.getElementById("password").value;
      const email = document.getElementById("email").value;

      const userRef = push(ref(database, "users"));
      set(userRef, {
        name: name,
        password: password,
        email: email,
      })
      .then(() => {
        status.innerText = "Data saved successfully!";
        form.reset();
      })
      .catch((error) => {
        status.innerText = "Error: " + error.message;
      });
    });
  </script>
</body>
</html>
